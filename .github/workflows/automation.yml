name: API Automation

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - application-merged
  workflow_dispatch:
    inputs:
      suite:
        description: Cucumber suite to run
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - ui
          - login

jobs:
  cucumber:
    name: Cucumber ${{ github.event.inputs.suite || github.event.client_payload.suite || 'all' }}
    runs-on: windows-latest
    timeout-minutes: 20

    env:
      BASE_API_URL: ${{ vars.BASE_API_URL || 'https://bataknese-wedding-budget.onrender.com' }}
      LOGIN_PATH: ${{ vars.LOGIN_PATH || '/api/auth/login' }}
      LOGIN_SUCCESS_STATUS: ${{ vars.LOGIN_SUCCESS_STATUS || '200' }}
      BROWSER: chrome
      HEADLESS: "true"
      DEFAULT_TIMEOUT: "10"
      RUBYLIB: ${{ github.workspace }}\support\ruby_overrides

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run Cucumber suite
        shell: pwsh
        run: |
          $suite = "${{ github.event.inputs.suite || github.event.client_payload.suite || 'all' }}"
          if ([string]::IsNullOrWhiteSpace($suite)) {
            $suite = "all"
          }

          New-Item -ItemType Directory -Force reports | Out-Null
          $reportArgs = @(
            "--format", "html", "--out", "reports/cucumber.html",
            "--format", "json", "--out", "reports/cucumber.json"
          )

          switch ($suite) {
            "api" { bundle exec cucumber -p api @reportArgs }
            "ui" { bundle exec cucumber -p ui @reportArgs }
            "login" { bundle exec cucumber --tags "@login" @reportArgs }
            default { bundle exec cucumber @reportArgs }
          }

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-${{ github.run_number }}
          path: reports/
          if-no-files-found: warn
